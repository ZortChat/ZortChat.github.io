<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZortChat - P2P Mobil Sohbet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans h-screen flex flex-col justify-between overflow-hidden">

    <header class="bg-slate-800 p-4 shadow-md text-center border-b border-slate-700">
        <h1 class="text-2xl font-black tracking-wider text-purple-400">ZORTCHAT</h1>
        <p class="text-xs text-slate-400 mt-1">Peer-to-Peer Mobil Uyumlu Güvenli Yazışma</p>
    </header>

    <section class="bg-slate-800/50 p-4 border-b border-slate-700 space-y-3">
        <div class="flex items-center justify-between bg-slate-900 p-2 rounded-lg border border-slate-700">
            <span class="text-xs text-slate-400 font-mono">Senin ID:</span>
            <span id="my-id" class="text-sm font-bold text-green-400 font-mono select-all">Yükleniyor...</span>
        </div>
        
        <div class="flex gap-2">
            <input id="peer-id-input" type="text" placeholder="Bağlanılacak Peer ID girin" 
                   class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 focus:outline-none focus:border-purple-500">
            <button id="connect-btn" onclick="connectToPeer()" 
                    class="bg-purple-600 hover:bg-purple-700 text-white font-medium text-sm px-4 py-2 rounded-lg transition-all active:scale-95">
                Bağlan
            </button>
        </div>
        <div id="status" class="text-xs text-center text-amber-400 font-medium">PeerJS sunucusuna bağlanılıyor...</div>
    </section>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-950/40">
        <div class="text-center text-xs text-slate-500 italic my-2">Sohbeti başlatmak için ID'nizi arkadaşınıza gönderin veya onun ID'sine bağlanın.</div>
    </main>

    <footer class="p-3 bg-slate-800 border-t border-slate-700 safe-bottom">
        <div class="flex gap-2 max-w-4xl mx-auto">
            <input id="message-input" type="text" placeholder="Mesajınızı zortlatın..." onkeypress="handleKeyPress(event)" disabled
                   class="flex-1 bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-purple-500 disabled:opacity-50 disabled:cursor-not-allowed">
            <button id="send-btn" onclick="sendMessage()" disabled
                    class="bg-purple-500 hover:bg-purple-600 text-white px-5 py-3 rounded-xl font-bold text-sm transition-all active:scale-95 disabled:opacity-50">
                Gönder
            </button>
        </div>
    </footer>

    <script>
        let peer = null;
        let conn = null;

        const myIdDisplay = document.getElementById('my-id');
        const peerIdInput = document.getElementById('peer-id-input');
        const connectBtn = document.getElementById('connect-btn');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const chatBox = document.getElementById('chat-box');
        const statusDisplay = document.getElementById('status');

        // 1. PeerJS Nesnesini Başlatma (Rastgele ID üretir)
        peer = new Peer();

        // Sunucuya bağlanıp ID aldığımızda tetiklenir
        peer.on('open', (id) => {
            myIdDisplay.innerText = id;
            statusDisplay.innerText = "Bağlantıya hazır. ID'nizi paylaşabilirsiniz.";
            statusDisplay.className = "text-xs text-center text-green-400 font-medium";
        });

        // 2. Gelen Bağlantıları Kabul Etme (Karşı taraf bize bağlanırsa)
        peer.on('connection', (connection) => {
            if (conn) {
                connection.close(); // ZortChat şu anlık tekil (1-1) bağlantı destekliyor
                return;
            }
            conn = connection;
            setupConnection();
        });

        // 3. Karşı Tarafa Bağlanma Buton Aksiyonu
        function connectToPeer() {
            const peerId = peerIdInput.value.trim();
            if (!peerId) return alert('Lütfen geçerli bir Peer ID girin.');
            
            statusDisplay.innerText = "Bağlantı kuruluyor...";
            statusDisplay.className = "text-xs text-center text-amber-400 font-medium";

            conn = peer.connect(peerId);
            setupConnection();
        }

        // 4. Bağlantı Ayarları ve Olay Yönetimi
        function setupConnection() {
            conn.on('open', () => {
                statusDisplay.innerText = `Bağlı: ${conn.peer}`;
                statusDisplay.className = "text-xs text-center text-blue-400 font-bold";
                
                // Inputları aktif et
                messageInput.disabled = false;
                sendBtn.disabled = false;
                peerIdInput.disabled = true;
                connectBtn.disabled = true;
                
                appendSystemMessage("Bağlantı başarıyla kuruldu! Yazışmaya başlayabilirsiniz.");
            });

            // Gelen mesajları yakalama
            conn.on('data', (data) => {
                appendMessage(data, 'received');
            });

            // Bağlantı koptuğunda
            conn.on('close', () => {
                statusDisplay.innerText = "Bağlantı koptu.";
                statusDisplay.className = "text-xs text-center text-red-400 font-medium";
                messageInput.disabled = true;
                sendBtn.disabled = true;
                peerIdInput.disabled = false;
                connectBtn.disabled = false;
                conn = null;
                appendSystemMessage("Karşı taraf sohbetten ayrıldı.");
            });
        }

        // 5. Mesaj Gönderme Fonksiyonu
        function sendMessage() {
            const msg = messageInput.value.trim();
            if (!msg || !conn) return;

            conn.send(msg); // Veriyi P2P olarak gönderir
            appendMessage(msg, 'sent');
            messageInput.value = '';
        }

        // Enter tuşu ile gönderme sağlama
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // 6. Arayüze Mesaj Ekleme (UI Helpers)
        function appendMessage(text, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${type === 'sent' ? 'justify-end' : 'justify-start'}`;

            const innerDiv = document.createElement('div');
            innerDiv.className = `max-w-[75%] px-4 py-2.5 rounded-2xl text-sm ${
                type === 'sent' 
                    ? 'bg-purple-600 text-white rounded-tr-none shadow-md' 
                    : 'bg-slate-800 text-slate-100 rounded-tl-none border border-slate-700'
            }`;
            innerDiv.innerText = text;

            msgDiv.appendChild(innerDiv);
            chatBox.appendChild(msgDiv);
            
            // Otomatik olarak aşağı kaydır
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendSystemMessage(text) {
            const sysDiv = document.createElement('div');
            sysDiv.className = "text-center text-xs text-slate-500 italic my-1";
            sysDiv.innerText = text;
            chatBox.appendChild(sysDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
  </html>
