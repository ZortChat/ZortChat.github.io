<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZortChat Pro Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; position: fixed; width: 100%; }
        .wa-bg {
            background-color: #0b141a;
            background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
            background-repeat: repeat;
        }
        #file-input { display: none; }
    </style>
</head>
<body class="wa-bg text-[#e9edef] font-sans flex flex-col justify-between h-screen w-screen antialiased">

    <header class="bg-[#202c33] px-4 py-2 flex items-center justify-between shadow-md border-b border-[#222e35] h-[60px] shrink-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-[#ea580c] flex items-center justify-center font-bold text-white text-sm">Ben</div>
            <div class="text-left">
                <span class="text-[#8696a0] block text-[9px] uppercase font-bold">ID'niz: <span id="my-id" class="text-[#00a884] font-mono select-all">...</span></span>
                <p id="status" class="text-[11px] text-[#8696a0] leading-none">Yükleniyor...</p>
            </div>
        </div>
        <div class="flex gap-1.5">
            <button onclick="toggleSection('setup-zone')" class="bg-[#2a3942] hover:bg-[#374955] text-xs px-2 py-1 rounded border border-[#374955]">⚙️ Kimlik/Rehber</button>
        </div>
    </header>

    <section id="setup-zone" class="bg-[#111b21] p-3 border-b border-[#222e35] space-y-3 shrink-0 z-40">
        <div class="flex gap-2 bg-[#182229] p-2 rounded-lg border border-[#222e35]">
            <input id="custom-id-input" type="text" placeholder="Kalıcı ID'nizi yazın" class="flex-1 bg-[#2a3942] rounded px-2 py-1 text-xs text-white focus:outline-none">
            <button onclick="changeMyId()" class="bg-[#ea580c] text-white text-xs px-3 py-1 rounded font-bold">Sabitle</button>
        </div>
        <div class="space-y-2 bg-[#182229] p-2 rounded-lg border border-[#222e35]">
            <p class="text-[11px] text-[#8696a0] font-bold uppercase">Rehbere Kişi Ekle</p>
            <input id="contact-name-input" type="text" placeholder="Arkadaşının Adı" class="w-full bg-[#2a3942] rounded px-2 py-1 text-xs text-white focus:outline-none mb-1">
            <div class="flex gap-2">
                <input id="contact-id-input" type="text" placeholder="Arkadaşının ID'si" class="flex-1 bg-[#2a3942] rounded px-2 py-1 text-xs text-white focus:outline-none">
                <button onclick="addContact()" class="bg-[#00a884] text-[#111b21] font-bold text-xs px-4 py-1 rounded">Kaydet</button>
            </div>
        </div>
        <div class="space-y-1 max-h-32 overflow-y-auto pt-1" id="contacts-list">
            </div>
    </section>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-2 flex flex-col bg-opacity-40 bg-black min-h-0">
        <div class="self-center bg-[#182229] text-[#8696a0] text-xs px-3 py-1.5 rounded-md text-center max-w-xs border border-[#222e35]">
            ⚙️ Yukarıdaki "Kimlik/Rehber" butonuna tıklayarak arkadaşınızı kaydedin ve üzerine dokunarak sohbeti başlatın.
        </div>
    </main>

    <div id="active-target-bar" class="bg-[#182229] px-4 py-1 text-xs text-[#8696a0] border-t border-[#222e35] text-center font-mono shrink-0 hidden">
        Hedef: <span id="active-contact-name" class="text-[#00a884] font-bold">Seçilmedi</span>
    </div>

    <footer class="bg-[#202c33] p-3 border-t border-[#222e35] h-[65px] shrink-0 flex items-center gap-2 z-50">
        <label for="file-input" class="cursor-pointer text-[#8696a0] hover:text-[#00a884] p-1 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z" /></svg>
        </label>
        <input type="file" id="file-input" accept="image/*" onchange="sendPhoto(this)">

        <button onclick="toggleRecording()" class="text-[#8696a0] hover:text-red-500 p-1 shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6" id="mic-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" /></svg>
        </button>

        <input id="message-input" type="text" placeholder="Bir mesaj yazın..." onkeypress="handleKeyPress(event)" 
               class="flex-1 bg-[#2a3942] border-none rounded-lg px-4 py-2 text-sm text-[#e9edef] placeholder-[#8696a0] focus:outline-none block w-full">
        
        <button onclick="sendMessage()" class="bg-[#00a884] hover:bg-[#008f72] text-[#111b21] p-2 rounded-full flex items-center justify-center shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 transform rotate-45 mr-0.5"><path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.53 60.53 0 0 0 18.14-11.752.75.75 0 0 0 0-1.148 60.53 60.53 0 0 0-18.14-11.752Z" /></svg>
        </button>
    </footer>

    <script>
        let peer = null;
        let conn = null;
        let contacts = JSON.parse(localStorage.getItem('zort_contacts')) || [];
        let messages = JSON.parse(localStorage.getItem('zort_messages')) || {};
        let activePeerId = null;
        let mediaRecorder, audioChunks = [], isRecording = false;

        const myIdDisplay = document.getElementById('my-id');
        const statusDisplay = document.getElementById('status');
        const chatBox = document.getElementById('chat-box');
        const contactsList = document.getElementById('contacts-list');
        const messageInput = document.getElementById('message-input');

        function init() {
            let id = localStorage.getItem('zort_my_id') || `Zort-${Math.floor(1000 + Math.random() * 9000)}`;
            localStorage.setItem('zort_my_id', id);
            
            if(peer) peer.destroy();
            peer = new Peer(id);

            peer.on('open', (currentId) => {
                myIdDisplay.innerText = currentId;
                statusDisplay.innerText = "Sistem Hazır";
                renderContacts();
            });

            peer.on('connection', (connection) => {
                let check = contacts.find(c => c.id === connection.peer);
                if (!check) {
                    contacts.push({ name: connection.peer, id: connection.peer });
                    localStorage.setItem('zort_contacts', JSON.stringify(contacts));
                    renderContacts();
                }
                conn = connection;
                handleConnEvents();
                selectContact(connection.peer);
            });
        }

        function toggleSection(id) { document.getElementById(id).classList.toggle('hidden'); }

        function changeMyId() {
            const val = document.getElementById('custom-id-input').value.trim();
            if(!val) return;
            localStorage.setItem('zort_my_id', val);
            init();
        }

        function addContact() {
            const name = document.getElementById('contact-name-input').value.trim();
            const id = document.getElementById('contact-id-input').value.trim();
            if(!name || !id) return alert("Eksik bilgi!");
            if(contacts.some(c=>c.id === id)) return;
            contacts.push({name, id});
            localStorage.setItem('zort_contacts', JSON.stringify(contacts));
            renderContacts();
        }

        function renderContacts() {
            contactsList.innerHTML = '';
            contacts.forEach(c => {
                const d = document.createElement('div');
                d.className = `flex justify-between items-center bg-[#2a3942] p-2 rounded text-xs mb-1 cursor-pointer hover:bg-[#374955]`;
                d.innerHTML = `<span onclick="selectContact('${c.id}')" class="font-bold flex-1">${c.name} (${c.id})</span>
                               <button onclick="deleteContact('${c.id}')" class="text-red-400 font-bold px-1">❌</button>`;
                contactsList.appendChild(d);
            });
        }

        function deleteContact(id) {
            contacts = contacts.filter(c=>c.id !== id);
            localStorage.setItem('zort_contacts', JSON.stringify(contacts));
            renderContacts();
        }

        function selectContact(id) {
            activePeerId = id;
            document.getElementById('active-target-bar').classList.remove('hidden');
            document.getElementById('active-contact-name').innerText = contacts.find(c=>c.id===id)?.name || id;
            document.getElementById('setup-zone').classList.add('hidden'); // Paneli kapat sohbet rahatlasın
            
            loadChat();

            if(!conn || conn.peer !== id) {
                statusDisplay.innerText = "Bağlanıyor...";
                if(conn) conn.close();
                conn = peer.connect(id);
                handleConnEvents();
            } else {
                statusDisplay.innerText = "Bağlandı";
            }
        }

        function handleConnEvents() {
            conn.on('open', () => { statusDisplay.innerText = "Çevrimiçi"; });
            conn.on('data', (data) => {
                if(data.type === 'delete') {
                    messages[conn.peer] = (messages[conn.peer] || []).filter(m => m.id !== data.msgId);
                    localStorage.setItem('zort_messages', JSON.stringify(messages));
                    if(activePeerId === conn.peer) loadChat();
                } else {
                    saveMsg(conn.peer, data.content, 'received', data.dataType, data.id);
                }
            });
            conn.on('close', () => { statusDisplay.innerText = "Çevrimdışı"; conn = null; });
        }

        function sendMessage() {
            const txt = messageInput.value.trim();
            if(!txt || !activePeerId) return;
            const mid = 'msg-'+Date.now();
            if(conn && conn.open) conn.send({ id: mid, dataType: 'text', content: txt });
            saveMsg(activePeerId, txt, 'sent', 'text', mid);
            messageInput.value = '';
        }

        function sendPhoto(input) {
            if(!activePeerId || !input.files[0]) return;
            const r = new FileReader();
            r.onload = function(e) {
                const mid = 'msg-'+Date.now();
                if(conn && conn.open) conn.send({ id: mid, dataType: 'image', content: e.target.result });
                saveMsg(activePeerId, e.target.result, 'sent', 'image', mid);
            };
            r.readAsDataURL(input.files[0]);
        }

        function toggleRecording() {
            const icon = document.getElementById('mic-icon');
            if(!isRecording) {
                navigator.mediaDevices.getUserMedia({ audio: true }).then(s => {
                    mediaRecorder = new MediaRecorder(s);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const b = new Blob(audioChunks, { type: 'audio/ogg; codecs=opus' });
                        const r = new FileReader();
                        r.onload = function(e) {
                            const mid = 'msg-'+Date.now();
                            if(conn && conn.open) conn.send({ id: mid, dataType: 'audio', content: e.target.result });
                            saveMsg(activePeerId, e.target.result, 'sent', 'audio', mid);
                        };
                        r.readAsDataURL(b);
                        s.getTracks().forEach(t => t.stop());
                    };
                    mediaRecorder.start();
                    isRecording = true;
                    icon.style.fill = "#ef4444";
                }).catch(() => alert("Mikrofon hatası"));
            } else {
                mediaRecorder.stop();
                isRecording = false;
                icon.style.fill = "none";
            }
        }

        function saveMsg(pid, content, type, dtype, mid) {
            if(!messages[pid]) messages[pid] = [];
            const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            messages[pid].push({ id: mid, content, senderType: type, dataType: dtype, timestamp: time });
            localStorage.setItem('zort_messages', JSON.stringify(messages));
            if(pid === activePeerId) loadChat();
        }

        function loadChat() {
            chatBox.innerHTML = '';
            const list = messages[activePeerId] || [];
            list.forEach(m => {
                const row = document.createElement('div');
                row.className = `flex w-full group ${m.senderType === 'sent' ? 'justify-end' : 'justify-start'}`;
                
                const box = document.createElement('div');
                box.className = `max-w-[75%] px-3 py-1.5 rounded-lg text-[14px] relative my-0.5 ${m.senderType === 'sent' ? 'bg-[#005c4b]' : 'bg-[#202c33]'}`;
                
                if(m.dataType === 'image') {
                    box.innerHTML = `<img src="${m.content}" class="max-w-full max-h-40 rounded">`;
                } else if(m.dataType === 'audio') {
                    box.innerHTML = `<audio src="${m.content}" controls class="w-44 h-8 scale-90 origin-left"></audio>`;
                } else {
                    box.innerHTML = `<span style="word-break:break-word">${m.content}</span>`;
                }
                
                box.innerHTML += `<button onclick="deleteMsg('${m.id}')" class="opacity-0 group-hover:opacity-100 absolute -top-1 right-0 bg-red-600 text-[9px] px-1 rounded">Sil</button>
                                  <span class="text-[9px] text-[#8696a0] block text-right mt-0.5">${m.timestamp}</span>`;
                row.appendChild(box);
                chatBox.appendChild(row);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function deleteMsg(mid) {
            messages[activePeerId] = (messages[activePeerId] || []).filter(m => m.id !== mid);
            localStorage.setItem('zort_messages', JSON.stringify(messages));
            if(conn && conn.open) conn.send({ type: 'delete', msgId: mid });
            loadChat();
        }

        function handleKeyPress(e) { if(e.key === 'Enter') sendMessage(); }

        window.onload = init;
    </script>
</body>
</html>
