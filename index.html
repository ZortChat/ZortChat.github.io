<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZortChat Pro v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        .wa-bg {
            background-color: #0b141a;
            background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
            background-repeat: repeat;
        }
        #file-input { display: none; }
    </style>
</head>
<body class="bg-[#111b21] text-[#e9edef] font-sans flex h-screen overflow-hidden">

    <aside id="sidebar" class="w-full md:w-80 bg-[#111b21] border-r border-[#222e35] flex flex-col shrink-0 h-full">
        <div class="bg-[#202c33] px-4 py-3 flex items-center justify-between border-b border-[#222e35]">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 rounded-full bg-[#ea580c] flex items-center justify-center font-bold text-white">Ben</div>
                <div class="text-xs">
                    <span class="text-[#8696a0] block text-[10px] uppercase">Sabit ID'niz</span>
                    <span id="my-id" class="font-mono font-bold text-[#00a884] select-all">Üretiliyor...</span>
                </div>
            </div>
            <button onclick="toggleCustomIdInput()" class="text-xs text-[#8696a0] hover:text-white">⚙️ Değiştir</button>
        </div>

        <div id="custom-id-container" class="p-3 bg-[#182229] border-b border-[#222e35] hidden flex gap-2">
            <input id="custom-id-input" type="text" placeholder="Yeni kalıcı ID yazın" class="flex-1 bg-[#2a3942] rounded px-2 py-1 text-xs text-white focus:outline-none">
            <button onclick="changeMyId()" class="bg-[#ea580c] text-white text-xs px-2 py-1 rounded font-bold">Kaydet</button>
        </div>

        <div class="p-3 bg-[#111b21] border-b border-[#222e35] space-y-2">
            <p class="text-xs text-[#8696a0] font-semibold uppercase tracking-wider">Yeni Kişi Kaydet</p>
            <div class="flex flex-col gap-2">
                <input id="contact-name-input" type="text" placeholder="Kişi Adı (Örn: Ahmet)" class="w-full bg-[#2a3942] rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none">
                <div class="flex gap-2">
                    <input id="contact-id-input" type="text" placeholder="Kişi ID'si (Örn: Zort-1234)" class="flex-1 bg-[#2a3942] rounded-lg px-3 py-1.5 text-xs text-white focus:outline-none">
                    <button onclick="addContact()" class="bg-[#00a884] hover:bg-[#008f72] text-[#111b21] font-bold text-xs px-4 py-1.5 rounded-lg transition-all">Kaydet</button>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto" id="contacts-list">
            </div>
    </aside>

    <main id="chat-area" class="flex-1 flex flex-col justify-between h-full relative hidden md:flex wa-bg">
        <header class="bg-[#202c33] px-4 py-3 flex items-center justify-between shadow-md border-b border-[#222e35] h-[60px] shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="backToSidebar()" class="md:hidden text-[#8696a0] mr-1">⬅️</button>
                <div class="w-10 h-10 rounded-full bg-[#00a884] flex items-center justify-center font-bold text-white text-lg shadow-sm" id="active-avatar">?</div>
                <div>
                    <h1 class="text-md font-medium text-[#e9edef] leading-tight" id="active-contact-name">Sohbet Seçin</h1>
                    <p id="status" class="text-xs text-[#8696a0]">çevrimdışı</p>
                </div>
            </div>
        </header>

        <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-2 flex flex-col bg-opacity-30 bg-black">
            <div class="self-center bg-[#182229] text-[#8696a0] text-xs px-3 py-1.5 rounded-md shadow-sm my-2 border border-[#222e35] text-center max-w-xs">
                👈 Soldaki rehberden bir kişi seçip bağlantı kurun.
            </div>
        </main>

        <footer class="bg-[#202c33] p-3 border-t border-[#222e35] h-[65px] shrink-0 flex items-center gap-2">
            <label for="file-input" class="cursor-pointer text-[#8696a0] hover:text-[#00a884] p-1 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z" /></svg>
            </label>
            <input type="file" id="file-input" accept="image/*" onchange="sendPhoto(this)">

            <button id="mic-btn" onclick="toggleRecording()" class="text-[#8696a0] hover:text-red-500 p-1 transition-colors relative">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6" id="mic-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" /></svg>
            </button>

            <input id="message-input" type="text" placeholder="Bir mesaj yazın..." onkeypress="handleKeyPress(event)" class="flex-1 bg-[#2a3942] border-none rounded-lg px-4 py-2 text-sm text-[#e9edef] placeholder-[#8696a0] focus:outline-none">
            
            <button onclick="sendMessage()" class="bg-[#00a884] hover:bg-[#008f72] text-[#111b21] p-2 rounded-full flex items-center justify-center shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 transform rotate-45 mr-0.5"><path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.53 60.53 0 0 0 18.14-11.752.75.75 0 0 0 0-1.148 60.53 60.53 0 0 0-18.14-11.752Z" /></svg>
            </button>
        </footer>
    </main>

    <script>
        let peer = null;
        let conn = null;
        
        // Veri Yapıları (LocalStorage Destekli)
        let contacts = JSON.parse(localStorage.getItem('zort_contacts')) || [];
        let messages = JSON.parse(localStorage.getItem('zort_messages')) || {}; // Format: { 'peerId': [msg1, msg2] }
        let activePeerId = null;

        // Ses Kayıt Değişkenleri
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        const myIdDisplay = document.getElementById('my-id');
        const customIdInput = document.getElementById('custom-id-input');
        const customIdContainer = document.getElementById('custom-id-container');
        const messageInput = document.getElementById('message-input');
        const chatBox = document.getElementById('chat-box');
        const statusDisplay = document.getElementById('status');
        const contactsList = document.getElementById('contacts-list');

        function getSavedOrRandomId() {
            let savedId = localStorage.getItem('zort_my_id');
            if (!savedId) {
                savedId = `Zort-${Math.floor(1000 + Math.random() * 9000)}`;
                localStorage.setItem('zort_my_id', savedId);
            }
            return savedId;
        }

        function startPeer(id) {
            if (peer) peer.destroy();
            peer = new Peer(id);

            peer.on('open', (currentId) => {
                myIdDisplay.innerText = currentId;
                renderContacts();
            });

            peer.on('connection', (connection) => {
                // Eğer gelen bağlantı rehberde yoksa geçici isimle ekle veya eşleştir
                let targetContact = contacts.find(c => c.id === connection.peer);
                if (!targetContact) {
                    targetContact = { name: connection.peer, id: connection.peer };
                    contacts.push(targetContact);
                    localStorage.setItem('zort_contacts', JSON.stringify(contacts));
                    renderContacts();
                }
                
                if (conn && conn.peer !== connection.peer) {
                    conn.close(); // Başka bir aktif görüşme varsa yeniyi reddet veya sıraya al
                }
                
                conn = connection;
                setupConnection();
                selectContact(connection.peer);
            });
        }

        startPeer(getSavedOrRandomId());

        // --- REHBER YÖNETİMİ ---
        function addContact() {
            const name = document.getElementById('contact-name-input').value.trim();
            const id = document.getElementById('contact-id-input').value.trim();
            if (!name || !id) return alert("Ad ve ID alanlarını doldurun!");

            if (contacts.some(c => c.id === id)) return alert("Bu ID zaten rehberde kayıtlı.");

            contacts.push({ name, id });
            localStorage.setItem('zort_contacts', JSON.stringify(contacts));
            
            document.getElementById('contact-name-input').value = '';
            document.getElementById('contact-id-input').value = '';
            renderContacts();
        }

        function renderContacts() {
            contactsList.innerHTML = '';
            contacts.forEach(c => {
                const item = document.createElement('div');
                item.className = `flex items-center justify-between p-3 border-b border-[#222e35] cursor-pointer hover:bg-[#202c33] transition-colors ${activePeerId === c.id ? 'bg-[#2a3942]' : ''}`;
                item.onclick = () => selectContact(c.id);

                item.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-[#00a884] flex items-center justify-center font-bold text-white">${c.name[0].toUpperCase()}</div>
                        <div>
                            <p class="text-sm font-medium text-white">${c.name}</p>
                            <p class="text-xs text-[#8696a0] font-mono">${c.id}</p>
                        </div>
                    </div>
                    <button onclick="deleteContact('${c.id}', event)" class="text-xs opacity-40 hover:opacity-100 p-1">❌</button>
                `;
                contactsList.appendChild(item);
            });
        }

        function deleteContact(id, event) {
            event.stopPropagation();
            if (!confirm("Bu kişiyi rehberden silmek istiyor musunuz?")) return;
            contacts = contacts.filter(c => c.id !== id);
            localStorage.setItem('zort_contacts', JSON.stringify(contacts));
            if (activePeerId === id) activePeerId = null;
            renderContacts();
            location.reload();
        }

        function selectContact(id) {
            activePeerId = id;
            const contact = contacts.find(c => c.id === id);
            
            document.getElementById('active-contact-name').innerText = contact.name;
            document.getElementById('active-avatar').innerText = contact.name[0].toUpperCase();
            
            // Mobil UI Görünürlük ayarı
            document.getElementById('sidebar').classList.add('hidden', 'md:flex');
            document.getElementById('sidebar').classList.remove('w-full');
            document.getElementById('chat-area').classList.remove('hidden');

            renderContacts();
            loadChatBox();

            // Eğer zaten bağlı değilsek, otomatik bağlanmayı dene
            if (!conn || conn.peer !== id) {
                statusDisplay.innerText = "bağlanıyor...";
                if (conn) conn.close();
                conn = peer.connect(id);
                setupConnection();
            } else {
                statusDisplay.innerText = "çevrimiçi";
            }
        }

        function backToSidebar() {
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('sidebar').classList.add('w-full');
            document.getElementById('chat-area').classList.add('hidden');
        }

        // --- BAĞLANTI & VERİ AKIŞI ---
        function setupConnection() {
            conn.on('open', () => {
                if (conn.peer === activePeerId) {
                    statusDisplay.innerText = "çevrimiçi";
                }
            });

            conn.on('data', (data) => {
                if (data.type === 'delete') {
                    remoteDeleteMessage(conn.peer, data.msgId);
                } else {
                    saveAndAppendMessage(conn.peer, data.content, 'received', data.dataType, data.id);
                }
            });

            conn.on('close', () => {
                if (conn && conn.peer === activePeerId) {
                    statusDisplay.innerText = "çevrimdışı";
                }
                conn = null;
            });
        }

        // --- MESAJ / DOSYA / SES GÖNDERİMİ ---
        function sendMessage() {
            const msg = messageInput.value.trim();
            if (!msg || !activePeerId) return;

            const msgId = 'msg-' + Date.now();
            if (conn && conn.open && conn.peer === activePeerId) {
                conn.send({ id: msgId, type: 'chat', dataType: 'text', content: msg });
            }
            saveAndAppendMessage(activePeerId, msg, 'sent', 'text', msgId);
            messageInput.value = '';
        }

        function sendPhoto(input) {
            if (!activePeerId) return;
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const msgId = 'msg-' + Date.now();
                if (conn && conn.open && conn.peer === activePeerId) {
                    conn.send({ id: msgId, type: 'chat', dataType: 'image', content: e.target.result });
                }
                saveAndAppendMessage(activePeerId, e.target.result, 'sent', 'image', msgId);
            };
            reader.readAsDataURL(file);
            input.value = '';
        }

        // --- SES KAYIT MEKANİZMASI ---
        function toggleRecording() {
            const micIcon = document.getElementById('mic-icon');
            if (!isRecording) {
                // Kaydı Başlat
                navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/ogg; codecs=opus' });
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            const base64Audio = e.target.result;
                            const msgId = 'msg-' + Date.now();
                            if (conn && conn.open && conn.peer === activePeerId) {
                                conn.send({ id: msgId, type: 'chat', dataType: 'audio', content: base64Audio });
                            }
                            saveAndAppendMessage(activePeerId, base64Audio, 'sent', 'audio', msgId);
                        };
                        reader.readAsDataURL(audioBlob);
                        
                        // Mikrofon donanım bağlantısını kapatma
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    micIcon.style.fill = "#ef4444"; // Kırmızı yap
                }).catch(err => alert("Mikrofon izni verilmedi veya cihaz bulunamadı."));
            } else {
                // Kaydı Durdur
                mediaRecorder.stop();
                isRecording = false;
                micIcon.style.fill = "none";
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        // --- VERİ TABANI & ARAYÜZ YÜKLEME ---
        function saveAndAppendMessage(peerId, content, senderType, dataType, msgId) {
            const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            if (!messages[peerId]) messages[peerId] = [];

            const msgObj = { id: msgId, content, senderType, dataType, timestamp };
            messages[peerId].push(msgObj);
            localStorage.setItem('zort_messages', JSON.stringify(messages));

            if (peerId === activePeerId) {
                renderSingleMessage(msgObj);
            }
        }

        function loadChatBox() {
            chatBox.innerHTML = '';
            const chatList = messages[activePeerId] || [];
            if (chatList.length === 0) {
                chatBox.innerHTML = `<div class="self-center bg-[#182229] text-[#8696a0] text-xs px-3 py-1.5 rounded-md text-center max-w-xs">Uçtan uca güvenli sohbet başladı.</div>`;
            }
            chatList.forEach(msg => renderSingleMessage(msg));
        }

        function renderSingleMessage(msg) {
            const msgDiv = document.createElement('div');
            msgDiv.id = msg.id;
            msgDiv.className = `flex w-full group ${msg.senderType === 'sent' ? 'justify-end' : 'justify-start'}`;

            const innerDiv = document.createElement('div');
            innerDiv.className = `max-w-[75%] px-3 py-1.5 rounded-lg text-[14.5px] shadow-sm relative ${
                msg.senderType === 'sent' ? 'bg-[#005c4b] text-[#e9edef] rounded-tr-none' : 'bg-[#202c33] text-[#e9edef] rounded-tl-none border border-[#222e35]'
            }`;

            // Veri tipine göre çizim
            if (msg.dataType === 'image') {
                const img = document.createElement('img');
                img.src = msg.content;
                img.className = "rounded-md max-w-full h-auto max-h-60 object-cover mb-1";
                innerDiv.appendChild(img);
            } else if (msg.dataType === 'audio') {
                const audio = document.createElement('audio');
                audio.src = msg.content;
                audio.controls = true;
                audio.className = "w-48 max-w-full h-8 scale-90 origin-left";
                innerDiv.appendChild(audio);
            } else {
                const textSpan = document.createElement('span');
                textSpan.innerText = msg.content;
                textSpan.style.wordBreak = 'break-word';
                innerDiv.appendChild(textSpan);
            }

            // Silme butonu
            const deleteBtn = document.createElement('button');
            deleteBtn.innerHTML = '🗑️';
            deleteBtn.className = "opacity-0 group-hover:opacity-100 absolute -top-2 -left-6 bg-slate-800 rounded p-0.5 text-xs cursor-pointer";
            deleteBtn.onclick = () => requestDeleteMessage(msg.id);
            innerDiv.appendChild(deleteBtn);

            const timeSpan = document.createElement('span');
            timeSpan.className = "text-[10px] text-[#8696a0] block text-right mt-1 ml-4 float-right select-none";
            timeSpan.innerText = msg.timestamp;
            innerDiv.appendChild(timeSpan);

            msgDiv.appendChild(innerDiv);
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function requestDeleteMessage(msgId) {
            if (!confirm("Bu mesajı silmek istiyor musunuz?")) return;
            if (conn && conn.open && conn.peer === activePeerId) {
                conn.send({ type: 'delete', msgId: msgId });
            }
            remoteDeleteMessage(activePeerId, msgId);
        }

        function remoteDeleteMessage(targetPeerId, msgId) {
            if (messages[targetPeerId]) {
                messages[targetPeerId] = messages[targetPeerId].filter(m => m.id !== msgId);
                localStorage.setItem('zort_messages', JSON.stringify(messages));
            }
            const element = document.getElementById(msgId);
            if (element) element.remove();
        }

        function toggleCustomIdInput() { customIdContainer.classList.toggle('hidden'); }
        function changeMyId() {
            const newId = customIdInput.value.trim();
            if (!newId) return;
            localStorage.setItem('zort_my_id', newId);
            startPeer(newId);
            customIdContainer.classList.add('hidden');
        }
    </script>
</body>
</html>
