<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZortChat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        .wa-bg {
            background-color: #0b141a;
            background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
            background-repeat: repeat;
        }
    </style>
</head>
<body class="wa-bg text-[#e9edef] font-sans flex flex-col justify-between">

    <header class="bg-[#202c33] px-4 py-3 flex items-center justify-between shadow-md border-b border-[#222e35] h-[65px] shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-[#00a884] flex items-center justify-center font-bold text-white text-lg shadow-sm">Z</div>
            <div>
                <h1 class="text-md font-medium text-[#e9edef] leading-tight">ZortChat</h1>
                <p id="status" class="text-xs text-[#8696a0]">ID Ayarlayın...</p>
            </div>
        </div>
        <div class="bg-[#111b21] px-3 py-1 rounded-full border border-[#222e35] text-center">
            <span class="text-[10px] text-[#8696a0] block uppercase tracking-wider font-semibold">Aktif ID</span>
            <span id="my-id" class="text-xs font-bold text-[#ea580c] font-mono select-all">YOK</span>
        </div>
    </header>

    <section id="setup-zone" class="bg-[#111b21] p-3 border-b border-[#222e35] space-y-2 shrink-0">
        <div class="flex gap-2" id="my-id-container">
            <input id="my-id-input" type="text" placeholder="Kendi ortak ID'nizi yazın (Örn: zort-tayfa)" 
                   class="flex-1 bg-[#2a3942] border-none rounded-lg px-3 py-2 text-sm text-[#e9edef] placeholder-[#8696a0] focus:outline-none focus:ring-1 focus:ring-[#00a884]">
            <button onclick="initializePeer()" class="bg-[#ea580c] hover:bg-[#c2410c] text-white font-bold text-xs px-4 py-2 rounded-lg transition-all">
                ID Sabitle
            </button>
        </div>
        
        <div class="flex gap-2 hidden" id="connect-container">
            <input id="peer-id-input" type="text" placeholder="Arkadaşının anlaştığınız ID'sini girin" 
                   class="flex-1 bg-[#2a3942] border-none rounded-lg px-3 py-2 text-sm text-[#e9edef] placeholder-[#8696a0] focus:outline-none focus:ring-1 focus:ring-[#00a884]">
            <button onclick="connectToPeer()" class="bg-[#00a884] hover:bg-[#008f72] text-[#111b21] font-bold text-xs px-4 py-2 rounded-lg transition-all">
                Bağlan
            </button>
        </div>
    </section>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-2 flex flex-col bg-opacity-20 bg-black">
        <div class="self-center bg-[#182229] text-[#8696a0] text-xs px-3 py-1.5 rounded-md shadow-sm my-2 border border-[#222e35] text-center max-w-xs">
            💡 Önce bir ID sabitleyin, ardından arkadaşınızın sabitlediği ortak ID'yi yazarak bağlanın.
        </div>
    </main>

    <footer class="bg-[#202c33] p-3 border-t border-[#222e35] h-[65px] shrink-0 flex items-center gap-2">
        <input id="message-input" type="text" placeholder="Bir mesaj yazın..." onkeypress="handleKeyPress(event)"
               class="flex-1 bg-[#2a3942] border-none rounded-lg px-4 py-2.5 text-sm text-[#e9edef] placeholder-[#8696a0] focus:outline-none z-50">
        <button onclick="sendMessage()" 
                class="bg-[#00a884] hover:bg-[#008f72] text-[#111b21] p-2.5 rounded-full flex items-center justify-center shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5 transform rotate-45 mr-0.5">
                <path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.53 60.53 0 0 0 18.14-11.752.75.75 0 0 0 0-1.148 60.53 60.53 0 0 0-18.14-11.752Z" />
            </svg>
        </button>
    </footer>

    <script>
        let peer = null;
        let conn = null;

        const myIdDisplay = document.getElementById('my-id');
        const myIdInput = document.getElementById('my-id-input');
        const peerIdInput = document.getElementById('peer-id-input');
        const messageInput = document.getElementById('message-input');
        const chatBox = document.getElementById('chat-box');
        const statusDisplay = document.getElementById('status');

        // Kendi istediğin özel ID ile PeerJS'i başlatma
        function initializePeer() {
            const desiredId = myIdInput.value.trim();
            if (!desiredId) return alert("Lütfen kendiniz için bir ortak ID kelimesi yazın!");

            peer = new Peer(desiredId);

            peer.on('open', (id) => {
                myIdDisplay.innerText = id;
                myIdDisplay.className = "text-xs font-bold text-[#00a884] font-mono select-all";
                statusDisplay.innerText = "bağlantı bekleniyor";
                
                // UI Güncelleme: Kendi ID alanını gizle, Karşıya Bağlanma alanını aç
                document.getElementById('my-id-container').classList.add('hidden');
                document.getElementById('connect-container').classList.remove('hidden');
                appendSystemMessage(`ID'niz '${id}' olarak sabitlendi.`);
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    alert("Bu ID şu an başkası tarafından kullanılıyor! Başka bir kelime deneyin.");
                } else {
                    alert("Hata oluştu: " + err.type);
                }
            </script>
</body>
</html>
